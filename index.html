<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>threshold</title>
  <link rel="stylesheet" href="style.css?v=15" />
</head>
<body>

  <!-- LANDING: split language threshold -->
  <div id="landing" aria-label="Language threshold">
    <button id="landing-en" class="landing-side landing-en" type="button" aria-label="Enter in English">
      <div class="landing-inner">
        <div class="landing-title">THRESHOLD</div>
        <div class="landing-line">The space between who you were and who you are becoming.</div>
      </div>
    </button>

    <div class="landing-seam" aria-hidden="true"></div>

    <button id="landing-es" class="landing-side landing-es" type="button" aria-label="Entrar en Español">
      <div class="landing-inner">
        <div class="landing-title">UMBRAL</div>
        <div class="landing-line">El límite entre lo conocido y lo que empieza a revelarse.</div>
      </div>
    </button>

    <div class="landing-hint" id="landing-hint">Tap a side to enter · Toca un lado para entrar</div>
  </div>

  <!-- INTRO -->
  <div id="intro" aria-hidden="true">
    <div id="intro-title">threshold</div>
    <div id="intro-subtitle">a question is a doorway</div>
  </div>

  <!-- MAIN UI -->
  <main id="ui" aria-label="Threshold questions" style="display:none;">
    <div id="top-right" aria-label="Controls">
      <button id="info-btn" type="button" class="ctrl" aria-label="About" title="About">ⓘ</button>
      <button id="sound-btn" type="button" class="ctrl" aria-label="Sound" title="Sound">🔊</button>

      <div id="lang-wrap">
        <button id="language-toggle" type="button" class="ctrl" aria-label="Toggle language" title="Language">EN | ES</button>
        <div id="size-pop" class="hidden" aria-label="Text size controls">
          <button id="size-down" type="button" class="size-btn" aria-label="Smaller text">A–</button>
          <button id="size-up" type="button" class="size-btn" aria-label="Larger text">A+</button>
        </div>
      </div>
    </div>

    <div id="cats" aria-label="Categories">
      <button class="cat" data-field="self" type="button">
        <span class="ico">○</span><span class="name" data-en="Self" data-es="Yo">Self</span>
      </button>
      <button class="cat" data-field="relationship" type="button">
        <span class="ico">∞</span><span class="name" data-en="Relationship" data-es="Vínculo">Relationship</span>
      </button>
      <button class="cat" data-field="body" type="button">
        <span class="ico">△</span><span class="name" data-en="Body" data-es="Cuerpo">Body</span>
      </button>
      <button class="cat" data-field="shadow" type="button">
        <span class="ico">◑</span><span class="name" data-en="Shadow" data-es="Sombra">Shadow</span>
      </button>
      <button class="cat" data-field="time" type="button">
        <span class="ico">⌛</span><span class="name" data-en="Time" data-es="Tiempo">Time</span>
      </button>
      <button class="cat" data-field="silence" type="button">
        <span class="ico">—</span><span class="name" data-en="Silence" data-es="Silencio">Silence</span>
      </button>
    </div>

    <section id="question-container" aria-live="polite">
      <div id="question"></div>
    </section>

    <button id="next" class="threshold-btn" type="button" aria-label="Next question">
      <span class="threshold-visual" aria-hidden="true">
        <span class="mirror"></span>
        <span class="caustics"></span>
        <span class="sheen"></span>

        <span class="rim"></span>
        <span class="rim rim2"></span>

        <span class="gate"></span>
        <span class="spark"></span>

        <span class="ripple r1"></span>
        <span class="ripple r2"></span>
        <span class="ripple r3"></span>
      </span>
      <span class="next-hint" id="next-hint">cross the threshold</span>
    </button>
  </main>

  <!-- INFO MODAL -->
  <div id="info-modal" class="hidden" role="dialog" aria-modal="true" aria-label="About">
    <div id="info-card">
      <button id="info-close" type="button" aria-label="Close">×</button>
      <div class="info-title" id="info-title">threshold</div>

      <div class="info-block">
        <div class="info-label" id="info-label-1">Threshold</div>
        <div class="info-text" id="info-text-1">The space between who you were and who you are becoming.</div>
      </div>

      <div class="info-block">
        <div class="info-label" id="info-label-2">Umbral</div>
        <div class="info-text" id="info-text-2">El límite entre lo conocido y lo que empieza a revelarse.</div>
      </div>
    </div>
  </div>

  <script src="questions.js?v=15"></script>
  <script src="engine.js?v=15"></script>
</body>
</html>
