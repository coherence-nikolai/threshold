<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>threshold</title>
  <link rel="stylesheet" href="style.css?v=9" />
</head>
<body>

  <!-- Language Landing Screen -->
  <div id="lang-screen" aria-label="Language selection">
    <div class="lang-card">
      <div class="lang-title">Choose language</div>
      <div class="lang-subtitle">Elige idioma</div>

      <div class="lang-buttons">
        <button id="choose-en" class="lang-btn" type="button">English</button>
        <button id="choose-es" class="lang-btn" type="button">Español</button>
      </div>

      <div class="lang-footnote">You can switch later.</div>
    </div>
  </div>

  <!-- Intro Title + Whisper (staged by JS/CSS) -->
  <div id="intro" style="display:none;">
    <div id="intro-title">threshold</div>
    <div id="intro-subtitle">a question is a doorway</div>
  </div>

  <!-- Main UI -->
  <div id="ui" style="display:none;">

    <!-- small top-right toggle -->
    <button id="language-toggle" type="button" aria-label="Toggle language">EN | ES</button>

    <div id="topbar">
      <button id="info-btn" type="button" aria-label="About">i</button>
    </div>

    <div id="field-selector" aria-label="Categories">
      <button data-field="self" type="button">
        <span class="symbol">○</span>
        <span class="label" data-en="Self" data-es="Yo">Self</span>
      </button>

      <button data-field="relationship" type="button">
        <span class="symbol">∞</span>
        <span class="label" data-en="Relationship" data-es="Vínculo">Relationship</span>
      </button>

      <button data-field="body" type="button">
        <span class="symbol">△</span>
        <span class="label" data-en="Body" data-es="Cuerpo">Body</span>
      </button>

      <button data-field="shadow" type="button">
        <span class="symbol">◑</span>
        <span class="label" data-en="Shadow" data-es="Sombra">Shadow</span>
      </button>

      <button data-field="time" type="button">
        <span class="symbol">⌛</span>
        <span class="label" data-en="Time" data-es="Tiempo">Time</span>
      </button>

      <button data-field="silence" type="button">
        <span class="symbol">—</span>
        <span class="label" data-en="Silence" data-es="Silencio">Silence</span>
      </button>
    </div>

    <div id="question-container" aria-live="polite">
      <div id="question" class="q-in"></div>
    </div>

    <!-- Threshold button (press to continue) -->
    <button id="next" class="threshold-btn" type="button" aria-label="Next question">
      <span class="threshold-visual" aria-hidden="true">
        <span class="mirror"></span>
        <span class="sheen"></span>
        <span class="rim"></span>
        <span class="rim rim2"></span>
        <span class="gate"></span>
        <span class="spark"></span>
      </span>
      <span class="threshold-sub" id="next-sub">next</span>
    </button>

  </div>

  <!-- Info Modal -->
  <div id="info-modal" class="hidden" role="dialog" aria-modal="true" aria-label="About">
    <div id="info-card">
      <button id="info-close" aria-label="Close" type="button">×</button>

      <div class="info-title" id="info-title">threshold</div>

      <div class="info-block">
        <div class="info-label" id="info-label-1">Threshold</div>
        <div class="info-text" id="info-text-1">
          The space between who you were and who you are becoming.
        </div>
      </div>

      <div class="info-block">
        <div class="info-label" id="info-label-2">Umbral</div>
        <div class="info-text" id="info-text-2">
          El límite entre lo conocido y lo que empieza a revelarse.
        </div>
      </div>
    </div>
  </div>

  <script src="questions.js?v=9"></script>
  <script src="engine.js?v=9"></script>
</body>
</html>
