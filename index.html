<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>threshold</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cormorant+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LANDING -->
  <div id="landing" aria-label="Language threshold">

    <div class="landing-wordmark" aria-hidden="true">
      <div class="landing-title-en">THRESHOLD</div>
      <div class="landing-seam-node"></div>
      <div class="landing-title-es">UMBRAL</div>
    </div>

    <div class="landing-choices">
      <button id="landing-en" class="landing-btn" type="button" aria-label="Enter in English">
        <span class="landing-btn-lang">English</span>
        <span class="landing-btn-line">The space between who you were and who you are becoming.</span>
      </button>

      <div class="landing-divider" aria-hidden="true">
        <div class="landing-divider-line"></div>
        <div class="landing-divider-node"></div>
        <div class="landing-divider-line"></div>
      </div>

      <button id="landing-es" class="landing-btn" type="button" aria-label="Entrar en Español">
        <span class="landing-btn-lang">Español</span>
        <span class="landing-btn-line">El límite entre lo conocido y lo que empieza a revelarse.</span>
      </button>
    </div>

    <div class="landing-hint" id="landing-hint">Choose your language &nbsp;·&nbsp; Elige tu idioma</div>
  </div>

  <!-- INTRO -->
  <div id="intro" aria-hidden="true">
    <div id="intro-title">threshold</div>
    <div id="intro-subtitle">a question is a doorway</div>
    <div class="intro-seam" aria-hidden="true"></div>
  </div>

  <!-- MAIN UI -->
  <main id="ui" aria-label="Threshold questions" style="display:none;">

    <!-- Persistent seam -->
    <div class="ui-seam" aria-hidden="true">
      <div class="ui-seam-line"></div>
      <div class="ui-seam-glow"></div>
    </div>

    <div id="top-right" aria-label="Controls">
      <button id="info-btn" type="button" class="ctrl" aria-label="About" title="About">ⓘ</button>
      <button id="sound-btn" type="button" class="ctrl" aria-label="Sound" title="Sound">♪</button>
      <div id="lang-wrap">
        <button id="language-toggle" type="button" class="ctrl lang-ctrl" aria-label="Toggle language" title="Language">
          <span class="lang-label" id="lang-label">EN · ES</span>
        </button>
        <div id="size-pop" aria-label="Text size controls">
          <button id="size-down" type="button" class="size-btn" aria-label="Smaller text">A−</button>
          <button id="size-up" type="button" class="size-btn" aria-label="Larger text">A+</button>
        </div>
      </div>
    </div>

    <!-- Categories -->
    <nav id="cats" aria-label="Categories">
      <button class="cat" data-field="self" type="button">
        <span class="cat-ico">○</span>
        <span class="cat-name" data-en="Self" data-es="Yo">Self</span>
      </button>
      <button class="cat" data-field="relationship" type="button">
        <span class="cat-ico">∞</span>
        <span class="cat-name" data-en="Relation" data-es="Vínculo">Relation</span>
      </button>
      <button class="cat" data-field="body" type="button">
        <span class="cat-ico">△</span>
        <span class="cat-name" data-en="Body" data-es="Cuerpo">Body</span>
      </button>
      <button class="cat" data-field="shadow" type="button">
        <span class="cat-ico">◑</span>
        <span class="cat-name" data-en="Shadow" data-es="Sombra">Shadow</span>
      </button>
      <button class="cat" data-field="time" type="button">
        <span class="cat-ico">⌛</span>
        <span class="cat-name" data-en="Time" data-es="Tiempo">Time</span>
      </button>
      <button class="cat" data-field="silence" type="button">
        <span class="cat-ico">—</span>
        <span class="cat-name" data-en="Silence" data-es="Silencio">Silence</span>
      </button>
    </nav>

    <!-- Question -->
    <section id="question-container" aria-live="polite">
      <div id="question"></div>
    </section>

    <!-- Cross button -->
    <button id="next" class="cross-btn" type="button" aria-label="Next question">
      <div class="cross-visual">
        <div class="cross-line"></div>
        <div class="cross-glow"></div>
        <div class="cross-node"></div>
        <div class="cross-ripple r1"></div>
        <div class="cross-ripple r2"></div>
        <div class="cross-ripple r3"></div>
      </div>
      <span class="cross-hint" id="next-hint">cross the threshold</span>
    </button>

  </main>

  <!-- INFO MODAL -->
  <div id="info-modal" class="hidden" role="dialog" aria-modal="true" aria-label="About">
    <div id="info-card">
      <button id="info-close" type="button" aria-label="Close">×</button>
      <div class="info-title" id="info-title">threshold</div>
      <div class="info-block">
        <div class="info-label" id="info-label-1">Threshold</div>
        <div class="info-text" id="info-text-1">The space between who you were and who you are becoming.</div>
      </div>
      <div class="info-block">
        <div class="info-label" id="info-label-2">Umbral</div>
        <div class="info-text" id="info-text-2">El límite entre lo conocido y lo que empieza a revelarse.</div>
      </div>
    </div>
  </div>

  <script src="questions.js"></script>
  <script src="engine.js"></script>
</body>
</html>
